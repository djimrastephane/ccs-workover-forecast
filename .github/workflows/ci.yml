name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Smoke test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: |
          python -c "
          from src.config_loader import load_component_assumptions, load_cost_assumptions, load_scenario_config
          from src.reliability_model import sample_mttf, mttf_to_annual_prob, lifecycle_multiplier_vector
          from src.failure_generator import generate_all_failures
          from src.intervention_engine import apply_intervention_decisions
          from src.campaign_scheduler import schedule_campaigns
          from src.economics import compute_annual_economics, compute_lifecycle_summary
          from src.simulation import run_simulation
          from src.reporting import (
              build_annual_forecast, compute_asset_health_scores,
              compute_component_contributions, compute_heatmap_data,
          )
          print('All imports OK')
          "

      - name: Simulation smoke test
        run: |
          python -c "
          from src.simulation import run_simulation
          from src.reporting import (
              build_annual_forecast, compute_asset_health_scores,
              compute_component_contributions, compute_heatmap_data,
          )
          from src.config_loader import load_component_assumptions

          failure_df, campaign_log, annual_costs, ls, campaign_event_map = run_simulation(
              n_simulations=20,
              n_injectors=8,
              n_monitoring=2,
              operating_years=30,
              seed=42,
              intervention_threshold=0.90,
          )

          assert not failure_df.empty, 'No failure events generated'
          assert not campaign_log.empty, 'No campaigns generated'
          assert not annual_costs.empty, 'No annual costs generated'
          assert not campaign_event_map.empty, 'No campaign event map generated'
          assert 'campaign_id' in campaign_event_map.columns, 'campaign_event_map missing campaign_id column'
          assert ls['p50_lifecycle_cost'] > 0, 'P50 lifecycle cost is zero'
          assert ls['p50_workovers'] > 0, 'P50 workovers is zero'

          required_cols = {
              'simulation_id', 'year', 'well_id', 'component',
              'trigger_type', 'sampled_mttf', 'lifecycle_multiplier',
              'adjusted_probability', 'intervention_type', 'estimated_cost',
          }
          missing = required_cols - set(failure_df.columns)
          assert not missing, f'Missing failure_df columns: {missing}'

          comps = set(failure_df['component'].unique())
          expected = {'tubing', 'packer', 'gauge', 'fiber_optics',
                      'wellhead', 'tree', 'cement_barrier', 'casing',
                      'hydrate_control', 'halite_plugging', 'carbonate_scaling',
                      'microbial_plugging',
                      'ssv', 'casing_valve', 'control_line', 'tubing_hanger',
                      'injection_flowmeter', 'annular_pressure_monitor'}
          assert expected.issubset(comps), f'Missing components: {expected - comps}'
          assert 'injectivity' not in comps, 'Legacy injectivity component should be split into sub-modes'

          assert 'reactive' in failure_df['trigger_type'].values, 'No reactive failures'

          # APM detection boost: cement_barrier and casing should show boosted
          # detection probability (0.60 and 0.50) alongside baseline values
          cement_probs = set(failure_df[failure_df['component'] == 'cement_barrier']['detection_probability'].round(2).unique())
          casing_probs = set(failure_df[failure_df['component'] == 'casing']['detection_probability'].round(2).unique())
          assert 0.60 in cement_probs, f'APM boost not seen for cement_barrier (probs: {cement_probs})'
          assert 0.50 in casing_probs, f'APM boost not seen for casing (probs: {casing_probs})'

          # Verify monitoring_program parameter works for all three tiers
          for tier in ('minimal', 'standard', 'comprehensive'):
              fdf, _, _, ls_tier, _ = run_simulation(
                  n_simulations=10, n_injectors=8, n_monitoring=2,
                  operating_years=30, seed=42, monitoring_program=tier,
              )
              assert not fdf.empty, f'No failures for monitoring_program={tier}'
          # Comprehensive should detect more failures as preventive than minimal
          # (test the mechanism, not the aggregate economics — too few wells for stable P50)
          fdf_min,  _, _, _, _ = run_simulation(n_simulations=50, n_injectors=8, n_monitoring=2,
                                               operating_years=30, seed=42, monitoring_program='minimal')
          fdf_comp, _, _, _, _ = run_simulation(n_simulations=50, n_injectors=8, n_monitoring=2,
                                               operating_years=30, seed=42, monitoring_program='comprehensive')
          prev_min  = (fdf_min['trigger_type']  == 'preventive').mean()
          prev_comp = (fdf_comp['trigger_type'] == 'preventive').mean()
          assert prev_comp > prev_min, (
              f'Comprehensive monitoring should yield more preventive events than minimal '
              f'({prev_comp:.3f} vs {prev_min:.3f})'
          )
          print(f'Preventive fraction: minimal={prev_min:.2%}  comprehensive={prev_comp:.2%}')

          early = failure_df[failure_df['year'] <= 5]['lifecycle_multiplier'].mean()
          late  = failure_df[failure_df['year'] >= 25]['lifecycle_multiplier'].mean()
          assert late > early, 'Wear-out multiplier should exceed infant-mortality average'

          comp_df = load_component_assumptions()
          hm = compute_heatmap_data(comp_df, 30)
          assert len(hm) == len(comp_df) * 30, 'Heatmap row count mismatch'
          late_prob  = hm[hm['year'] == 30]['adjusted_prob'].mean()
          early_prob = hm[hm['year'] == 3]['adjusted_prob'].mean()
          assert late_prob > early_prob, 'Late-life probability should exceed useful-life probability'

          hs = compute_asset_health_scores(failure_df, 20, 10, 30)
          assert len(hs) > 0, 'No health scores computed'
          for label, info in hs.items():
              assert 0 <= info['score'] <= 100, f'Health score out of range for {label}'

          print(f'P50 workovers:     {ls[\"p50_workovers\"]:.0f}')
          print(f'P50 lifecycle cost: \${ls[\"p50_lifecycle_cost\"]/1e6:.1f}M')
          print(f'Components seen:   {sorted(comps)}')
          print(f'Smoke test PASSED')
          "

      - name: Validate scenario ordering
        run: |
          python -c "
          from src.simulation import run_simulation

          def p50_cost(scenario):
              _, _, _, ls, _ = run_simulation(
                  n_simulations=200, n_injectors=20, n_monitoring=5,
                  operating_years=20, scenario_id=scenario, seed=42,
              )
              return ls['p50_lifecycle_cost']

          conservative = p50_cost('conservative_design')
          base         = p50_cost('base_case')
          high_corr    = p50_cost('high_corrosion')

          # conservative_design: 0.6x failures * 1.1x cost = 0.66x expected cost vs base.
          # With a 25-well fleet and 200 simulations this gap is reliably detectable.
          assert conservative < base, (
              f'Conservative ({conservative:.0f}) should cost less than base ({base:.0f})'
          )
          # base vs high_corrosion: 1.0x vs 1.8x failures * 1.3x cost = 2.34x — very large gap.
          assert base < high_corr, (
              f'Base ({base:.0f}) should cost less than high corrosion ({high_corr:.0f})'
          )
          print(f'Conservative: \${conservative/1e6:.1f}M  Base: \${base/1e6:.1f}M  High corrosion: \${high_corr/1e6:.1f}M')
          print('Scenario ordering PASSED')
          "

      - name: Validate legacy fleet age offset (issue 5)
        run: |
          python -c "
          import numpy as np
          from src.reliability_model import lifecycle_multiplier_vector
          from src.simulation import run_simulation

          # start_age shifts the bathtub curve: legacy well skips infant
          # mortality, enters the wear-out ramp immediately, caps at 1.8x
          lc_leg = lifecycle_multiplier_vector(30, start_age=20)
          assert lc_leg[0] == 1.0 and (lc_leg[1:] > 1.0).all(), 'legacy well not in wear-out ramp'
          assert not np.any(lc_leg == 1.5), 'legacy well should skip infant mortality'
          assert abs(lc_leg.max() - 1.8) < 1e-9, 'wear-out ramp must cap at 1.8x'

          kw = dict(n_simulations=150, n_injectors=20, n_monitoring=5,
                    operating_years=30, seed=42)
          _, _, _, ls_new, _ = run_simulation(**kw, legacy_well_fraction=0.0)
          f_mix, _, _, ls_mix, _ = run_simulation(**kw, legacy_well_fraction=0.5, legacy_start_age=15)
          f_leg, _, _, ls_leg, _ = run_simulation(**kw, legacy_well_fraction=1.0, legacy_start_age=15)

          # Mixed fleet P50 demand must sit between all-new and all-legacy bounds
          wn, wm, wl = ls_new['p50_workovers'], ls_mix['p50_workovers'], ls_leg['p50_workovers']
          assert wn < wm < wl, f'Mixed fleet not between bounds: {wn:.0f} / {wm:.0f} / {wl:.0f}'

          # Trace columns: effective_year = operating year + start_age
          assert (f_leg['start_age'] == 15).all(), 'all-legacy fleet should have start_age=15'
          assert (f_leg['effective_year'] == f_leg['year'] + 15).all(), 'effective_year mismatch'
          ages = f_mix.groupby('well_id')['start_age'].first()
          assert set(ages.unique()) == {0, 15}, 'mixed fleet should contain both age classes'

          print(f'P50 workovers: all-new={wn:.0f}  mixed-50%={wm:.0f}  all-legacy={wl:.0f}')
          print('Legacy fleet age offset PASSED')
          "

      - name: Validate injectivity sub-modes and CO2 stream quality (issues 3, 4)
        run: |
          python -c "
          import numpy as np
          from src.reliability_model import lifecycle_multiplier_vector
          from src.simulation import run_simulation

          # Lifecycle shapes (issue 3)
          inf = lifecycle_multiplier_vector(30, shape='infant')
          pla = lifecycle_multiplier_vector(30, shape='plateau')
          wo  = lifecycle_multiplier_vector(30, shape='wear_out')
          assert inf[0] == 2.0 and (inf[4:] == 1.0).all(), 'infant shape wrong'
          assert abs(pla[0] - 0.8) < 1e-9 and abs(pla[-1] - 1.2) < 1e-9, 'plateau shape wrong'
          assert (wo[:20] == 1.0).all() and abs(wo[-1] - 1.8) < 1e-9, 'wear_out shape wrong'
          # Injection-driven shapes ignore start_age
          assert np.array_equal(inf, lifecycle_multiplier_vector(30, start_age=20, shape='infant'))

          kw = dict(n_simulations=50, n_injectors=16, n_monitoring=4,
                    operating_years=30, seed=42)
          fdf, _, _, _, _ = run_simulation(**kw)
          submodes = {'hydrate_control', 'halite_plugging', 'carbonate_scaling', 'microbial_plugging'}
          assert submodes <= set(fdf['component'].unique()), 'sub-modes missing'

          # Sub-modes are injector-only; hydrate starts at 2.0x and never escalates
          for sm in submodes:
              assert set(fdf[fdf['component'] == sm]['well_type'].unique()) <= {'injector'}
          hyd = fdf[fdf['component'] == 'hydrate_control']
          assert np.isclose(hyd[hyd['year'] == 1]['lifecycle_multiplier'], 2.0).all()
          esc = fdf[fdf['component'].isin(submodes) & (fdf['intervention_type'] == 'full_workover')]
          assert not esc.empty, 'no flow-assurance escalation seen'
          assert 'hydrate_control' not in set(esc['component']), 'hydrate must never escalate'

          # CO2 stream quality ordering (issue 4)
          kw2 = dict(n_simulations=150, n_injectors=20, n_monitoring=5,
                     operating_years=30, seed=42)
          f_p, _, _, ls_p, _ = run_simulation(**kw2, co2_stream_quality='pipeline')
          _,   _, _, ls_i, _ = run_simulation(**kw2, co2_stream_quality='industrial')
          f_s, _, _, ls_s, _ = run_simulation(**kw2, co2_stream_quality='sour')
          cp, ci, cs = (ls_p['p50_lifecycle_cost'], ls_i['p50_lifecycle_cost'],
                        ls_s['p50_lifecycle_cost'])
          assert cp < ci < cs, f'stream quality ordering violated: {cp:.0f}/{ci:.0f}/{cs:.0f}'

          # Multipliers hit only the sensitive components
          bp_p = f_p.groupby('component')['base_probability'].median()
          bp_s = f_s.groupby('component')['base_probability'].median()
          ratio = (bp_s / bp_p).dropna()
          assert ratio['gauge'] < 1.05 and ratio['wellhead'] < 1.05, 'insensitive component shifted'
          assert ratio['halite_plugging'] > 1.5, 'injectivity multiplier not applied'
          assert ratio['tubing'] > 2.0, 'corrosion multiplier not applied'

          print(f'P50 cost: pipeline=\${cp/1e6:.0f}M  industrial=\${ci/1e6:.0f}M  sour=\${cs/1e6:.0f}M')
          print('Injectivity sub-modes + stream quality PASSED')
          "
